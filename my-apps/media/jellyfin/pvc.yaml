apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: config
  namespace: jellyfin
  labels:
    app: jellyfin
    type: config
    # backup: "daily"  # Disabled - deployment not running (node affinity)
spec:
  storageClassName: nfs-client
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  # dataSourceRef is added dynamically by Kyverno if a backup exists

