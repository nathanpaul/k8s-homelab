apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage-dashboard
data:
  settings.yaml: |
    title: Paul Nathan Dashboard
    theme: dark
    color: slate
    headerStyle: clean
    layout:
      Development:
        style: row
        columns: 4
      Home:
        style: row
        columns: 3
      Media:
        style: row
        columns: 4
      Infrastructure & Monitoring:
        style: row
        columns: 4
  services.yaml: |
    - Development:
        - Argo CD:
            icon: argocd.png
            href: https://argocd.paulnathan.io
            description: GitOps Continuous Delivery
            widget:
              type: argocd
              url: https://argocd.paulnathan.io
        - Echo Server:
            icon: mdi-server-outline
            href: https://echo.paulnathan.io
            description: HTTP Echo & Debug Server
    - Home:
        - Home Assistant:
            icon: home-assistant.png
            href: https://homeassistant.paulnathan.io
            description: Smart Home Automation
    - Media:
        - Jellyfin:
            icon: jellyfin.png
            href: https://jellyfin.paulnathan.io
            description: Media Streaming Server
    - Infrastructure & Monitoring:
        - Grafana:
            icon: grafana.png
            href: https://grafana.paulnathan.io
            description: Dashboards & Visualization
        - Prometheus:
            icon: prometheus.png
            href: https://prometheus.paulnathan.io
            description: Metrics & Monitoring
        - Alertmanager:
            icon: alertmanager.png
            href: https://alertmanager.paulnathan.io
            description: Alert Management
        - Longhorn:
            icon: longhorn.png
            href: https://longhorn.paulnathan.io
            description: Storage Management
        - Kopia:
            icon: kopia.png
            href: https://kopia.paulnathan.io
            description: Backup Management
        - Container Registry:
            icon: docker.png
            href: https://registry.paulnathan.io
            description: Container Image Registry
        - Redis Commander:
            icon: redis.png
            href: https://redis.paulnathan.io
            description: Redis Management UI
        - BigNas:
            icon: truenas.png
            href: http://192.168.1.59
            description: Network Attached Storage
