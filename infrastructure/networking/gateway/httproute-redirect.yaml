apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-to-https-redirect
  namespace: gateway
spec:
  parentRefs:
  # Attach to the internal gateway's port 80 listener
  - name: gateway-internal
    sectionName: http
  # Attach to the external gateway's port 80 listener
  - name: gateway-external
    sectionName: http
  rules:
  - filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
