apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# kubePrism (localhost:7445) handles control plane HA via Omni's SideroLink
# Only need service LoadBalancer resources for applications

# NOTE: Apply ip-pool.yaml and bgp-policy.yaml AFTER Cilium is running
# These require Cilium CRDs to be installed first

resources:
 - crds/ciliumbgpclusterconfigs.yaml
 - crds/ciliumbgppeerconfigs.yaml
 - crds/ciliumbgpadvertisements.yaml
 - crds/ciliumbgpnodeconfigs.yaml
 - crds/ciliumbgpnodeconfigoverrides.yaml
 - ip-pool.yaml
 - bgp-policy.yaml
 - policies/block-lan-access.yaml

helmCharts:
- name: cilium
  repo: https://helm.cilium.io
  version: 1.19.2
  releaseName: cilium
  includeCRDs: true
  namespace: kube-system
  valuesFile: values.yaml

generatorOptions:
  disableNameSuffixHash: true
