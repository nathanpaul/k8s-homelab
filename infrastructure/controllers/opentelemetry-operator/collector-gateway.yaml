apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: otel-gateway
  namespace: opentelemetry
spec:
  mode: deployment
  replicas: 3
  serviceAccount: otel-gateway
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  env:
  - name: HONEYCOMB_API_KEY
    valueFrom:
      secretKeyRef:
        name: honeycomb-api-key
        key: api-key
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

      # Watch VPA recommendations as log events
      k8sobjects:
        objects:
        - name: verticalpodautoscalers
          mode: pull
          interval: 5m
          group: autoscaling.k8s.io

      # Cluster-wide metrics from K8s API (pod phases, deployments, restarts, node conditions)
      k8s_cluster:
        auth_type: serviceAccount
        collection_interval: 30s
        node_conditions_to_report:
        - Ready
        - MemoryPressure
        - DiskPressure
        allocatable_types_to_report:
        - cpu
        - memory
        - nvidia.com/gpu

    processors:
      # Enrich with Kubernetes metadata from API server
      k8sattributes:
        auth_type: "serviceAccount"
        passthrough: false
        extract:
          metadata:
          - k8s.namespace.name
          - k8s.pod.name
          - k8s.pod.uid
          - k8s.node.name
          - k8s.container.name
          - k8s.deployment.name
          - k8s.statefulset.name
          - k8s.daemonset.name
          - k8s.replicaset.name
          labels:
          - tag_name: app
            key: app
            from: pod
          - tag_name: app
            key: app.kubernetes.io/name
            from: pod
        pod_association:
        - sources:
          - from: resource_attribute
            name: k8s.pod.uid
        - sources:
          - from: resource_attribute
            name: k8s.pod.name
          - from: resource_attribute
            name: k8s.namespace.name

      # Set service.name from app label if not already set
      resource:
        attributes:
        - key: service.name
          from_attribute: app
          action: upsert
        - key: k8s.cluster.name
          value: talos-prod
          action: upsert

      # Batch for efficient export
      batch:
        timeout: 10s
        send_batch_size: 8192
        send_batch_max_size: 16384

    exporters:
      # Honeycomb - all signals via OTLP HTTP
      otlphttp/honeycomb:
        endpoint: https://api.honeycomb.io
        headers:
          x-honeycomb-team: ${env:HONEYCOMB_API_KEY}
        sending_queue:
          enabled: true
          num_consumers: 10
          queue_size: 10000

      # Tempo - traces via OTLP gRPC
      otlp/tempo:
        endpoint: tempo.monitoring.svc.cluster.local:4317
        tls:
          insecure: true

      # Loki - logs via OTLP HTTP
      otlphttp/loki:
        endpoint: http://loki-gateway.loki-stack.svc.cluster.local/otlp
        tls:
          insecure: true

      # Prometheus - metrics via OTLP HTTP
      otlphttp/prometheus:
        endpoint: http://kube-prometheus-stack-prometheus.prometheus-stack.svc.cluster.local:9090/api/v1/otlp
        tls:
          insecure: true

    service:
      pipelines:
        logs:
          receivers: [otlp, k8sobjects]
          processors: [k8sattributes, resource, batch]
          exporters: [otlphttp/honeycomb, otlphttp/loki]
        traces:
          receivers: [otlp]
          processors: [k8sattributes, resource, batch]
          exporters: [otlphttp/honeycomb, otlp/tempo]
        metrics:
          receivers: [otlp, k8s_cluster]
          processors: [k8sattributes, resource, batch]
          exporters: [otlphttp/honeycomb, otlphttp/prometheus]
