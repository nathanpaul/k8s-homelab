---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: vpa-min-allowed
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    policies.kyverno.io/title: Inject VPA minAllowed from Workload Annotations
    policies.kyverno.io/description: >-
      Reads vpa.kubernetes.io/min-memory (and optionally min-cpu) annotations
      from the VPA's target workload and injects them as minAllowed into the
      VPA's resourcePolicy. This prevents VPA from shrinking bursty apps
      (databases, JVM, ML inference) below their runtime floor.
      Add the annotation to any Deployment/StatefulSet/DaemonSet — Kyverno
      handles the rest. Example: vpa.kubernetes.io/min-memory: "2Gi"
spec:
  background: false
  emitWarning: false
  validationFailureAction: Audit
  rules:
    - name: inject-min-allowed
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds:
                - autoscaling.k8s.io/v1/VerticalPodAutoscaler
              selector:
                matchLabels:
                  app.kubernetes.io/managed-by: kyverno
      context:
        # Map targetRef.kind to the plural API resource name
        - name: pluralKind
          variable:
            jmesPath: >-
              request.object.spec.targetRef.kind == 'Deployment' && 'deployments' ||
              request.object.spec.targetRef.kind == 'StatefulSet' && 'statefulsets' ||
              'daemonsets'
        # Fetch the target workload to read its annotations
        - name: workload
          apiCall:
            method: GET
            urlPath: "/apis/apps/v1/namespaces/{{request.object.metadata.namespace}}/{{pluralKind}}/{{request.object.spec.targetRef.name}}"
      preconditions:
        all:
          - key: "{{ workload.metadata.annotations.\"vpa.kubernetes.io/min-memory\" || '' }}"
            operator: NotEquals
            value: ""
      mutate:
        patchStrategicMerge:
          spec:
            resourcePolicy:
              containerPolicies:
                - containerName: "*"
                  minAllowed:
                    memory: "{{ workload.metadata.annotations.\"vpa.kubernetes.io/min-memory\" }}"
