---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: vpa-auto-generate
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    policies.kyverno.io/title: Auto-Generate VPA for All Workloads
    policies.kyverno.io/description: >-
      Automatically creates a VerticalPodAutoscaler for every Deployment,
      StatefulSet, and DaemonSet. Infrastructure and monitoring namespaces
      get updateMode "Off" (recommend-only, manual review via vpa-report.sh
      and Grafana). User app namespaces get "Initial" for automatic
      resource tuning at pod creation (K8s 1.32+).
spec:
  mutateExistingOnPolicyUpdate: false
  background: false
  emitWarning: false
  validationFailureAction: Audit
  rules:
    # Rule 1: Infrastructure and monitoring — recommend only
    # Resources in these namespaces are manually tuned via GitOps.
    # VPA provides recommendations but does not auto-apply them.
    - name: generate-vpa-recommend-only
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds:
                - Deployment
                - StatefulSet
                - DaemonSet
              namespaces:
                # Wave 0 — foundation
                - argocd
                - 1passwordconnect
                - external-secrets
                # Wave 1 — storage
                - longhorn-system
                - snapshot-controller
                # Wave 4 — infrastructure controllers
                - cert-manager
                - external-dns
                - gpu-device-plugin
                - gpu-operator
                - metrics-server
                - node-feature-discovery
                - reloader
                - vertical-pod-autoscaler
                # Wave 4 — infrastructure networking
                - cloudflared
                - gateway
                # Wave 4 — infrastructure storage
                - csi-driver-nfs
                - csi-driver-smb
                - kopia-ui
                - local-storage
                # Wave 4 — databases
                - cloudnative-pg
                - postgres-operator
                - redis
                - redis-instance
                # Wave 5 — monitoring
                - prometheus-stack
                - loki-stack
                - monitoring
                - k8sgpt
                - pod-cleanup
      generate:
        synchronize: false
        apiVersion: autoscaling.k8s.io/v1
        kind: VerticalPodAutoscaler
        name: "{{request.object.metadata.name}}"
        namespace: "{{request.namespace}}"
        data:
          metadata:
            labels:
              app.kubernetes.io/managed-by: kyverno
              vpa.kubernetes.io/mode: "off"
            ownerReferences:
              - apiVersion: "{{request.object.apiVersion}}"
                kind: "{{request.object.kind}}"
                name: "{{request.object.metadata.name}}"
                uid: "{{request.object.metadata.uid}}"
          spec:
            targetRef:
              apiVersion: apps/v1
              kind: "{{request.object.kind}}"
              name: "{{request.object.metadata.name}}"
            updatePolicy:
              updateMode: "Off"
    # Rule 2: User applications — auto-tune at creation
    # VPA sets optimal resources when pods are created but does NOT shrink
    # running pods. This prevents OOM kills on bursty workloads (e.g. Kafka,
    # TubeSync) where steady-state usage is low but peak usage needs headroom.
    - name: generate-vpa-auto-tune
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds:
                - Deployment
                - StatefulSet
                - DaemonSet
      exclude:
        any:
          - resources:
              namespaces:
                # System — no VPA
                - kube-system
                - kyverno
                - volsync-system
                # Infrastructure — handled by recommend-only rule
                - argocd
                - 1passwordconnect
                - external-secrets
                - longhorn-system
                - snapshot-controller
                - cert-manager
                - external-dns
                - gpu-device-plugin
                - gpu-operator
                - metrics-server
                - node-feature-discovery
                - reloader
                - vertical-pod-autoscaler
                - cloudflared
                - gateway
                - csi-driver-nfs
                - csi-driver-smb
                - kopia-ui
                - local-storage
                - cloudnative-pg
                - postgres-operator
                - redis
                - redis-instance
                # Monitoring — handled by recommend-only rule
                - prometheus-stack
                - loki-stack
                - monitoring
                - k8sgpt
                - pod-cleanup
      generate:
        synchronize: false
        apiVersion: autoscaling.k8s.io/v1
        kind: VerticalPodAutoscaler
        name: "{{request.object.metadata.name}}"
        namespace: "{{request.namespace}}"
        data:
          metadata:
            labels:
              app.kubernetes.io/managed-by: kyverno
              vpa.kubernetes.io/mode: "auto"
            ownerReferences:
              - apiVersion: "{{request.object.apiVersion}}"
                kind: "{{request.object.kind}}"
                name: "{{request.object.metadata.name}}"
                uid: "{{request.object.metadata.uid}}"
          spec:
            targetRef:
              apiVersion: apps/v1
              kind: "{{request.object.kind}}"
              name: "{{request.object.metadata.name}}"
            updatePolicy:
              updateMode: "Initial"
