apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: database
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  # Preserve skip-reconcile annotation during DR recovery
  # Without this, the ApplicationSet controller strips manual annotations
  ignoreApplicationDifferences:
  - jsonPointers:
    - /metadata/annotations/argocd.argoproj.io~1skip-reconcile
  generators:
  - git:
      repoURL: https://github.com/nathanpaul/k8s-homelab.git
      revision: main
      directories:
      - path: infrastructure/database/*/*
  template:
    metadata:
      name: '{{path.basename}}'
      annotations:
        argocd.argoproj.io/manifest-generate-paths: '{{path}}'
        argocd.argoproj.io/sync-wave: "4"
      labels:
        app.kubernetes.io/part-of: database
    spec:
      project: infrastructure
      revisionHistoryLimit: 3
      source:
        repoURL: https://github.com/nathanpaul/k8s-homelab.git
        targetRevision: main
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path.basename}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: false
          allowEmpty: false
        syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
        - RespectIgnoreDifferences=true
        - Replace=false
        retry:
          limit: -1  # Infinite retries — apps must never permanently die during bootstrap
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 10m
      # NOTE: .status ignored globally by ArgoCD 3.0+ — only non-status fields listed
      ignoreDifferences:
      - group: postgresql.cnpg.io
        kind: Cluster
        jsonPointers:
        - /metadata/generation
        jqPathExpressions:
        - .spec.bootstrap
        - .spec.externalClusters
      - group: external-secrets.io
        kind: ExternalSecret
        jqPathExpressions:
        - .metadata.generation
        - .metadata.finalizers
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
      # PVC fields that are immutable after creation
      - group: ""
        kind: PersistentVolumeClaim
        jqPathExpressions:
        - .spec.dataSourceRef
        - .spec.dataSource
        - .spec.volumeName
        - .spec.resources.requests.storage
