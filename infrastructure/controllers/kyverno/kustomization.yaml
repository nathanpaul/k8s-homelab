apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kyverno
resources:
- namespace.yaml
- rbac-patch.yaml
- policies/volsync-pvc-backup-restore.yaml
- policies/volsync-nfs-inject.yaml
- policies/volsync-orphan-cleanup.yaml
# NOTE: VPA policies moved to infrastructure/controllers/kyverno-vpa-policies/
# They deploy at wave 4 (via infrastructure AppSet) after the VPA CRD exists.
# Including them here (wave 3) causes Kyverno's webhook to reject them because
# the VerticalPodAutoscaler CRD doesn't exist yet.
helmCharts:
- name: kyverno
  repo: https://kyverno.github.io/kyverno
  version: 3.7.1
  releaseName: kyverno
  namespace: kyverno
  valuesFile: values.yaml

patches:
- target:
    group: apiextensions.k8s.io
    kind: CustomResourceDefinition
    name: clusterpolicies.kyverno.io
  patch: |-
    - op: replace
      path: /metadata/annotations
      value:
        argocd.argoproj.io/sync-options: Prune=false
- target:
    group: apiextensions.k8s.io
    kind: CustomResourceDefinition
    name: policies.kyverno.io
  patch: |-
    - op: replace
      path: /metadata/annotations
      value:
        argocd.argoproj.io/sync-options: Prune=false
